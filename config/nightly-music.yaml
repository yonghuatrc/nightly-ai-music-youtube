# Nightly AI Music Configuration
# Edit this file from Windows to change behavior — no code changes needed.
# Script reads from: config/nightly-music.yaml (project-relative via PROJECT_DIR)

# Number of songs to generate each night
song_count: 2  # Phase 1: 2 songs/night. Increase for Phase 2

# Language configuration:
#   "chinese-only"  — All songs in Chinese (default)
#   "mixed"         — Random EN/ZH/KR/JP (old behavior)
#   ["Chinese", "English"]  — Explicit list, random pick from these
language: "chinese-only"

# Trending source:
#   Single source: "qq-douyin"
#   Multiple sources (tried in order, deduplicated):
#     - "qq-douyin"
#     - "kkbox"
#   Sources: "qq-douyin" | "kkbox" | "my-fm" | "pool"
trending_source:
  - "qq-douyin"
  - "kkbox"
  - "my-fm"

# Telegram batching:
#   songs_per_message: Max songs per Telegram message (default: 5)
#   Telegram limits: max 20 file attachments per message
telegram:
  songs_per_message: 5

# Output directories (YEAR-MONTH-DAY subfolder created automatically)
# output_dir defaults to: <project>/output/
# d_drive_mirror defaults to: /mnt/d/Hermes/songs/nightly-songs
d_drive_mirror: "/mnt/d/Hermes/songs/nightly-songs"

# YouTube integration (set enabled: true after OAuth setup)
# Setup: python3 scripts/nightly_uploader.py --setup-auth
youtube:
  enabled: true
  privacy: "private"
  category: "10"
  tags:
    - "AI Music"
    - "华语流行"
    - "AISong"
    - "人工智能音乐"
    - "AI歌曲"
    - "华语情歌"
    - "中文歌曲"
    - "AI情歌"
    - "AI生成音乐"
    - "AI音乐 2026"
    - "华语流行歌曲"
    - "人工智能创作歌曲"
    - "治愈系音乐"
    - "睡前音乐"
    - "MiniMax"
    - "华语新歌推荐"

# Visualizer settings
visualizer:
  enabled: true
  resolution: "1920x1080"
  # Phase 2: Burn SRT subtitles into long-form video (improves retention)
  lyrics_overlay: true
  # Phase 2: Detect mood from lyrics → color-shift waveform palette
  mood_colors: true

# Shorts generation — YouTube Shorts (9:16 vertical, chorus-based)
# Each song gets a Short clipped to the loudest 45-second segment.
shorts:
  enabled: true
  duration_sec: 30  # Phase 2: 45s → 30s (higher retention)
  upload_time: "12:00"
  tags:
    - "#Shorts"
    - "AIMusic"
    - "华语流行"
    - "AI中文歌"
    - "AI歌曲"

# Visual asset generation (per-song backgrounds + thumbnails via Pollinations.ai)
visual:
  enabled: true
  generate_backgrounds: true
  generate_thumbnails: true
  llm_prompt_source: "minimax"
  pollinations_delay: 15

# API retry settings
max_lyrics_retries: 3
